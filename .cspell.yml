# For settings, see
# https://www.streetsidesoftware.com/vscode-spell-checker/docs/configuration/
version: "0.2"
language: en-US
caseSensitive: true
ignorePaths:
  - "*.svg"
  - "test/fixtures/code-excerpt-updater/**"
patterns:
  - name: CodeBlock
    pattern: |
      /
          ^(\s*[~`]{3,})   # code-block start
          .*               # all languages and options, e.g. shell {hl_lines=[12]}
          [\s\S]*?         # content
          \1               # code-block end - cSpell:disable-next-line
      /igmx
  - name: HeadingID # For example: {#some-id}
    pattern: /\{\#.*?\}/g
languageSettings:
  - languageId: markdown
    ignoreRegExpList:
      - CodeBlock
      - HeadingID
dictionaries:
  # Programming languages and software terms
  - node
  - softwareTerms
  # Other
  - companies
words:
  - endprettify
  - goldens
  - postbuild
  - chalin
  - docregion
  - docplaster
  - enddocregion
  - excerpter
  - nvmrc
  - pkgs
