name: Links

on:
  merge_group:
  pull_request:
  push: { branches: [main] }

permissions:
  contents: read

jobs:
  check-links:
    name: CHECK LINKS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run lychee link checker
        uses: lycheeverse/lychee-action@v2
        with: { args: --verbose . }
      - run: npm run postcheck:links
      - run: npm run _diff:fail
